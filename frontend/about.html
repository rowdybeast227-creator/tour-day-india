<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>What is this? · India Virtual Peloton</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet" />
<style>
/* ─── Theme tokens ─────────────────────────────────────────────── */
:root{
  --background:#ffffff;
  --foreground:#0a0a0a;
  --primary:#0a0a0a;
  --accent:#ffff00;
  --destructive:#d4183d;
  --border:rgba(0,0,0,0.1);
  --serif:'Fraunces',serif;
  --sans:'Bricolage Grotesque',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--background);color:var(--primary);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{padding-bottom:76px;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:var(--sans);cursor:pointer}
em{font-style:normal}
.serif{font-family:var(--serif)}
.tabnum{font-variant-numeric:tabular-nums}
.upper{text-transform:uppercase}
img{display:block}
input{font-family:var(--sans)}
input:focus-visible,button:focus-visible{outline:none}
::selection{background:var(--accent);color:var(--primary)}

@keyframes marquee-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ─── Layout shell ─────────────────────────────────────────────── */
.shell{min-height:100vh;display:flex;flex-direction:column;background:#fff;padding-bottom:76px}

/* ─── Nav ──────────────────────────────────────────────────────── */
.nav{border-bottom:1px solid var(--border);position:relative;z-index:50;background:#fff}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 32px}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-wrap img{height:38px;width:auto;object-fit:contain}
.logo-meta{font-size:11px;font-weight:300;line-height:1.2;border-left:1px solid rgba(10,10,10,.2);padding-left:12px}
.logo-meta .l1{font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.5}
.logo-meta .l2{font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-size:11px}
.nav-links{display:flex;align-items:center;gap:28px;font-size:14px}
.nav-links button.link{background:none;border:none;font-size:14px;color:var(--primary);transition:color .15s}
.nav-links button.link:hover{color:var(--accent);text-shadow:0 0 0 var(--primary)}
.nav-links button.link:hover{color:#0a0a0a;background:var(--accent)}
.nav-cta{display:flex;align-items:center;gap:8px}
.btn-outline{border:1px solid var(--primary);color:var(--primary);font-size:13px;letter-spacing:.02em;padding:9px 20px;background:transparent;transition:.15s}
.btn-outline:hover{background:var(--primary);color:var(--accent)}
.btn-solid{background:var(--primary);color:var(--accent);font-size:13px;letter-spacing:.02em;padding:9px 20px;border:none;transition:opacity .15s}
.btn-solid:hover{opacity:.9}
.nav-username{font-size:14px;color:var(--primary);white-space:nowrap}
.nav-username b{font-weight:500}
.hamburger{display:none;background:none;border:none;padding:8px;color:var(--primary)}
.mobile-menu{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 10px 24px rgba(0,0,0,.12);flex-direction:column}
.mobile-menu.open{display:flex}
.mobile-menu .mlink{text-align:left;padding:16px 20px;font-size:15px;border-bottom:1px solid var(--border);color:rgba(10,10,10,.6);background:none;border-left:none;border-right:none;border-top:none}
.mobile-menu .mlink:hover{color:var(--primary)}
.mobile-cta{display:flex;gap:12px;padding:16px 20px}
.mobile-cta button{flex:1;font-size:13px;padding:12px}

/* ─── Marquee ──────────────────────────────────────────────────── */
.marquee{background:var(--accent);color:var(--primary);overflow:hidden;white-space:nowrap;border-bottom:1px solid var(--primary)}
.marquee-track{display:inline-block;padding:7px 0;font-size:11px;letter-spacing:.18em;text-transform:uppercase;animation:marquee-scroll 28s linear infinite}
.marquee-track span{margin:0 28px}

/* ─── Hero grid ────────────────────────────────────────────────── */
.hero{flex:1;border-bottom:1px solid var(--border)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr}
.hero-left{display:flex;flex-direction:column;border-right:1px solid var(--border)}
.hero-mobile{display:none;flex-direction:column}

.route-map{border-bottom:1px solid var(--border);background:#fff;padding:0}
.route-map img{width:100%;height:420px;object-fit:contain;object-position:center}

/* ─── Stage list ───────────────────────────────────────────────── */
.stage-list{flex:1;border-top:1px solid var(--border);padding:16px 28px}
.stage-scroll{overflow-y:auto;max-height:300px;scrollbar-width:none}
.stage-scroll::-webkit-scrollbar{display:none}
.stage-row{display:grid;grid-template-columns:72px 96px 72px 1fr 1fr;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;position:relative}
.stage-row:last-child{border-bottom:none}
.stage-row.rest{opacity:.7}
.stage-row.past{opacity:.4}
.stage-row.today{background:var(--accent);margin:0 -4px;padding-left:12px;padding-right:12px;border-left:4px solid #0a0a0a}
.stage-row span{padding:0 8px}
.stage-row span.pl0{padding-left:0}
.stage-row .muted{color:rgba(10,10,10,.4)}
.stage-row .med{font-weight:500}
.stage-row .dist-unit{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(10,10,10,.5);margin-left:4px;vertical-align:middle}
.stage-row .loc{color:rgba(10,10,10,.5)}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── Your stage ───────────────────────────────────────────────── */
.your-stage{background:var(--accent);display:flex;flex-direction:column}
.your-stage-empty{background:var(--accent);display:flex;flex-direction:column;justify-content:center;padding:32px;min-height:520px}
.empty-inner{display:flex;flex-direction:column;align-items:flex-start;gap:18px;max-width:360px}
.empty-inner h3{font-family:var(--serif);font-weight:500;font-size:26px;line-height:1.05;letter-spacing:-.01em;color:var(--primary)}
.empty-inner p{font-size:15px;line-height:1.6;color:rgba(10,10,10,.75);max-width:320px}
.btn-register{margin-top:6px;background:var(--primary);color:var(--accent);border:none;padding:16px 22px;font-size:15px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:10px;transition:transform .15s}
.btn-register:hover{transform:translateY(-1px)}

.ys-header{background:var(--primary);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.ys-header .lbl{display:flex;align-items:center;gap:10px}
.ys-header .lbl span{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,0,.7)}
.ys-header .pill{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,0,.5);border:1px solid rgba(255,255,0,.2);padding:2px 8px}
.ys-body{display:flex;flex-direction:column;flex:1;padding:24px 32px 32px;gap:24px}
.ys-typelabel{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(10,10,10,.5);margin-bottom:8px}
.ys-instruction{font-family:var(--serif);font-weight:500;color:var(--primary);line-height:1.15;letter-spacing:-.01em;font-size:clamp(26px,3vw,36px)}
.ys-goal{margin-top:16px;display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(10,10,10,.3);padding:6px 12px}
.ys-goal .g-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(10,10,10,.5)}
.ys-goal .g-sep{width:1px;height:12px;background:rgba(10,10,10,.2)}
.ys-goal .g-val{font-size:13px;font-weight:500;color:var(--primary);letter-spacing:.02em}
.ys-note{margin-top:10px;font-size:12.5px;color:rgba(10,10,10,.55);line-height:1.6}
.ys-zone{display:flex;align-items:center;gap:8px}
.ys-zone .z-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(10,10,10,.45)}
.ys-zone .z-val{border:1px solid rgba(10,10,10,.4);padding:4px 10px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);font-weight:500}

/* Deadline timer */
.deadline{border-width:1.5px;border-style:solid;padding:12px 16px}
.deadline.normal{border-color:rgba(10,10,10,.25);background:transparent}
.deadline.urgent{border-color:var(--primary);background:var(--primary)}
.deadline.expired{border-color:rgba(212,24,61,.4);background:rgba(212,24,61,.05)}
.deadline-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.deadline .dl-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;color:rgba(10,10,10,.45)}
.deadline.urgent .dl-lbl{color:rgba(255,255,0,.7)}
.deadline .dl-time{font-size:28px;font-weight:400;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1;color:var(--primary)}
.deadline.urgent .dl-time{color:var(--accent)}
.deadline .dl-urgent-tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,0,.6);margin-left:4px}
.deadline .dl-expired{font-size:13px;color:rgba(212,24,61,.8)}
.deadline .dl-right{text-align:right;font-size:11px;line-height:1.6;color:rgba(10,10,10,.4)}
.deadline.urgent .dl-right{color:rgba(255,255,0,.55)}
.deadline-bar{margin-top:10px;height:3px;background:rgba(10,10,10,.1);width:100%;overflow:hidden}
.deadline-bar>span{display:block;height:100%;background:rgba(10,10,10,.3);transition:width 1s}
.deadline.urgent .deadline-bar>span{background:var(--accent)}

/* Log entry */
.log-wrap{margin-top:auto}
.log-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(10,10,10,.5);margin-bottom:12px}
.log-fields{display:flex;flex-direction:column;gap:10px}
.log-input{width:100%;background:transparent;border:1.5px solid rgba(10,10,10,.4);padding:10px 16px;font-size:14px;color:var(--primary)}
.log-input::placeholder{color:rgba(10,10,10,.4)}
.log-input:focus{border-color:var(--primary)}
.log-input.err{border-color:var(--destructive)}
.field-err{margin-top:4px;font-size:11px;color:var(--destructive)}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stats-row .log-input{padding:10px 12px}
.upload-btn{width:100%;border:1.5px dashed rgba(10,10,10,.3);padding:12px 16px;display:flex;align-items:center;gap:12px;background:transparent;transition:border-color .15s}
.upload-btn:hover{border-color:rgba(10,10,10,.6)}
.upload-btn.err{border-color:var(--destructive)}
.upload-btn .u-txt{font-size:13px;color:rgba(10,10,10,.45);text-align:left}
.upload-btn:hover .u-txt{color:rgba(10,10,10,.7)}
.upload-preview{position:relative;border:1.5px solid rgba(10,10,10,.4);overflow:hidden;height:90px}
.upload-preview img{width:100%;height:100%;object-fit:cover}
.upload-preview .rm{position:absolute;top:6px;right:6px;background:var(--primary);color:var(--accent);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none}
.log-submit{width:100%;background:var(--primary);color:var(--accent);padding:12px;font-size:13px;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:8px;border:none;transition:transform .15s}
.log-submit:hover{transform:translateY(-1px)}
.log-success{background:var(--primary);padding:20px;display:flex;flex-direction:column;gap:12px}
.log-success .row{display:flex;align-items:center;gap:10px}
.log-success .chk{width:20px;height:20px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.log-success .msg{font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.02em}
.log-success p{font-size:12px;color:rgba(255,255,0,.6);line-height:1.6}
.rest-box{margin-top:auto;border:1px solid rgba(10,10,10,.2);padding:12px 16px;font-size:13px;color:rgba(10,10,10,.55);line-height:1.6}
.rest-box strong{color:var(--primary);font-weight:500}

/* ─── Sections ─────────────────────────────────────────────────── */
.section{border-top:1px solid var(--border);padding:56px 32px;background:#fff}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:32px}
.section-head h2{font-family:var(--serif);font-weight:500;line-height:1;letter-spacing:-.01em;color:var(--primary);font-size:clamp(30px,4vw,44px)}
.section-head p{font-size:14px;color:rgba(10,10,10,.55);max-width:360px;margin-top:8px}
.filters{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;border:1px solid var(--primary)}
.filter-group button{border:none;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;border-right:1px solid var(--primary);background:transparent;color:var(--primary);transition:.15s}
.filter-group button:last-child{border-right:none}
.filter-group button:hover{background:rgba(10,10,10,.05)}
.filter-group button.active{background:var(--primary);color:var(--accent)}

.table-wrap{border:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.table-wrap::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:collapse}
.lb-table{min-width:640px}
.streak-table{min-width:380px}
thead tr{background:rgba(10,10,10,.03)}
th{text-align:left;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(10,10,10,.45);font-weight:400;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
th.r{text-align:right}
th.on{color:var(--primary)}
th .sortmark{margin-left:4px;color:var(--accent);background:var(--primary);padding:1px 4px;font-size:9px;vertical-align:middle}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(10,10,10,.02)}
tbody tr.first{background:var(--accent)}
tbody tr.first:hover{background:var(--accent)}
td{padding:16px 12px}
td.rank{font-size:20px;font-weight:400;width:52px;text-align:center;color:rgba(10,10,10,.35)}
tr.first td.rank{color:var(--primary);font-weight:500}
td .rider-name{font-weight:500;display:block;font-size:14px;color:var(--primary);line-height:1.2}
td .rider-city{font-size:12px;color:rgba(10,10,10,.55);letter-spacing:.01em}
.zone-tag{font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(10,10,10,.4);color:rgba(10,10,10,.7);padding:2px 8px;display:inline-block}
tr.first .zone-tag{border-color:var(--primary);color:var(--primary)}
.metric{text-align:right}
.metric .val{font-size:18px;font-weight:400;letter-spacing:-.01em;font-variant-numeric:tabular-nums;color:rgba(10,10,10,.7)}
.metric .val.hi{color:var(--primary)}
.metric .unit{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(10,10,10,.4);margin-left:4px;vertical-align:middle}
.streak-info{border:1px solid var(--border);padding:8px 12px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(10,10,10,.4)}
.progress-cell{display:flex;align-items:center;justify-content:flex-end;gap:12px}
.progress-track{width:96px;height:3px;background:rgba(10,10,10,.1);flex-shrink:0}
tr.first .progress-track{background:rgba(10,10,10,.2)}
.progress-fill{height:100%;background:rgba(10,10,10,.4)}
tr.first .progress-fill{background:rgba(10,10,10,.6)}
.progress-num{font-size:13px;color:rgba(10,10,10,.55);font-variant-numeric:tabular-nums;width:48px;text-align:right}
.progress-num .of{color:rgba(10,10,10,.3)}
.streak-days .n{font-size:20px;font-weight:400;color:var(--primary);font-variant-numeric:tabular-nums}
.streak-days .u{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(10,10,10,.4);margin-left:4px;vertical-align:middle}

/* ─── Clock ────────────────────────────────────────────────────── */
.clock{position:fixed;bottom:80px;right:24px;z-index:50;background:var(--primary);color:var(--accent);padding:12px 16px;border:1px solid var(--accent);box-shadow:0 12px 32px rgba(0,0,0,.28)}
.clock .fr{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,0,.7);margin-bottom:6px}
.clock .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle;animation:pulse-dot 1.6s ease-in-out infinite}
.clock .t{display:flex;align-items:baseline;gap:6px}
.clock .t strong{font-weight:400;font-size:20px;letter-spacing:.06em;color:#fff;font-variant-numeric:tabular-nums}
.clock .t .ampm{font-size:11px;letter-spacing:.1em;color:rgba(255,255,0,.6)}

/* ─── Sticky progress ──────────────────────────────────────────── */
.sticky-progress{position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;border-top:1.5px solid var(--primary);padding:10px 20px 12px}
.sp-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.sp-head .l{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(10,10,10,.55)}
.sp-head .r{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--primary)}
.sp-scroll{overflow-x:auto;display:flex;justify-content:center;scrollbar-width:none}
.sp-scroll::-webkit-scrollbar{display:none}
.sp-track{display:flex;gap:3px;padding-top:20px;padding-bottom:2px}
.seg{width:34px;height:10px;flex-shrink:0;position:relative}
.seg>span{display:block;width:100%;height:100%}
.seg .f-today{background:var(--accent);outline:2px solid var(--primary);outline-offset:1px}
.seg .f-rest{background:var(--primary)}
.seg .f-past{background:rgba(10,10,10,.12)}
.seg .f-future{background:rgba(10,10,10,.06);border:1px solid rgba(10,10,10,.1)}
.seg .marker{position:absolute;top:-18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none}
.seg .marker .stem{width:1px;height:8px;background:var(--primary)}
.seg .marker .dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}

/* ─── Credit line ──────────────────────────────────────────────── */
.credit-line{font-size:10px;color:rgba(10,10,10,.4);text-align:center;letter-spacing:.03em;padding-top:6px}
.credit-fixed{position:fixed;left:0;right:0;bottom:10px;z-index:45;pointer-events:none}

/* ─── Mobile floating CTA ──────────────────────────────────────── */
.mobile-float{display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none}
.mobile-float button{pointer-events:auto;background:var(--primary);color:var(--accent);font-size:13px;letter-spacing:.04em;padding:14px 24px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);border:none;transition:transform .15s}
.mobile-float button:hover{transform:translateY(-2px)}

/* ─── Modals ───────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.scroll{align-items:flex-start;overflow-y:auto;padding:24px 16px}
.overlay.top{align-items:flex-start}
.modal{background:#fff;width:100%;position:relative}
.modal.w440{max-width:440px}
.modal.w560{max-width:560px}
.modal.w580{max-width:580px}
.modal.w660{max-width:660px}
.modal-header{background:var(--primary);padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.modal-header .mh-kicker{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,0,.6);margin-bottom:4px}
.modal-header h2{font-family:var(--serif);font-weight:500;font-size:26px;line-height:1;color:var(--accent);letter-spacing:-.01em}
.modal-close{background:none;border:none;color:rgba(255,255,0,.5);padding:4px;transition:color .15s}
.modal-close:hover{color:var(--accent)}
.about-close{background:none;border:none;color:var(--primary);padding:8px;position:absolute;top:14px;right:14px}

/* form fields */
.fields{padding:28px 32px 8px;display:grid;gap:20px}
.field label{display:block;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
.inp{width:100%;background:transparent;border:1.5px solid rgba(10,10,10,.25);padding:12px 16px;font-size:15px;color:var(--primary);transition:border-color .15s}
.inp::placeholder{color:rgba(10,10,10,.3)}
.inp:hover{border-color:rgba(10,10,10,.5)}
.inp:focus{border-color:var(--primary)}
.inp.err{border-color:var(--destructive)}
.field-hint{margin-top:6px;font-size:12px;color:rgba(10,10,10,.5);display:flex;align-items:center;gap:6px}
.field-hint strong{color:rgba(10,10,10,.7);font-weight:500}
.err-msg{margin-top:6px;font-size:12px;color:var(--destructive)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.relative{position:relative}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-1px)translateY(-50%);background:none;border:none;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(10,10,10,.4);transition:color .15s}
.pw-toggle:hover{color:var(--primary)}
.pw-strength{margin-top:8px;display:flex;align-items:center;gap:8px}
.pw-bars{display:flex;gap:4px;flex:1}
.pw-bars>div{height:3px;flex:1;background:rgba(10,10,10,.1);transition:background .15s}
.pw-bars>div.s1{background:var(--destructive)}
.pw-bars>div.s2{background:#facc15}
.pw-bars>div.s3{background:#22c55e}
.pw-strength .plabel{font-size:11px;color:rgba(10,10,10,.5);letter-spacing:.06em}
.at-prefix{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(10,10,10,.35);font-size:15px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.zone-card{text-align:left;padding:16px;border:1.5px solid rgba(10,10,10,.2);background:transparent;transition:.15s}
.zone-card:hover{border-color:rgba(10,10,10,.5)}
.zone-card.sel{background:var(--accent);border-color:var(--primary)}
.zone-card .zc-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px}
.zone-card .zc-km{font-family:var(--serif);font-weight:500;font-size:21px;line-height:1;color:var(--primary)}
.zone-card .zc-tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border:1px solid rgba(10,10,10,.25);color:rgba(10,10,10,.45);flex-shrink:0}
.zone-card.sel .zc-tag{border-color:var(--primary);color:var(--primary)}
.zone-card .zc-desc{font-size:12.5px;line-height:1.6;color:rgba(10,10,10,.45)}
.zone-card.sel .zc-desc{color:rgba(10,10,10,.75)}

.modal-footer{padding:20px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.modal-footer p{font-size:13px;color:rgba(10,10,10,.5)}
.switch-link{background:none;border:none;color:var(--primary);font-weight:500;border-bottom:1px solid var(--accent);padding-bottom:1px;transition:.15s}
.switch-link:hover{background:var(--accent)}
.btn-submit{background:var(--primary);color:var(--accent);padding:14px 28px;font-size:15px;letter-spacing:.02em;border:none;display:inline-flex;align-items:center;gap:10px;transition:transform .15s;flex-shrink:0}
.btn-submit:hover{transform:translateY(-1px)}

/* register success */
.reg-success{padding:48px 32px;display:flex;flex-direction:column;align-items:flex-start;gap:20px}
.reg-success .ico{background:var(--accent);width:48px;height:48px;display:flex;align-items:center;justify-content:center}
.reg-success h3{font-family:var(--serif);font-weight:500;font-size:28px;line-height:1.2;color:var(--primary);margin-bottom:8px}
.reg-success p{font-size:15px;color:rgba(10,10,10,.65);line-height:1.6;max-width:440px}
.reg-success strong{color:var(--primary);font-weight:500}
.reg-success .back{margin-top:8px;background:var(--primary);color:var(--accent);padding:14px 24px;font-size:14px;letter-spacing:.02em;border:none;transition:transform .15s}
.reg-success .back:hover{transform:translateY(-1px)}

/* instructions */
.inst-body{padding:28px 32px;display:flex;flex-direction:column;gap:32px}
.inst-intro{font-size:14px;color:rgba(10,10,10,.6);line-height:1.6}
.inst-sect-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.inst-sect-head .bar{width:6px;height:20px;flex-shrink:0}
.inst-sect-head .bar.acc{background:var(--accent)}
.inst-sect-head .bar.pri{background:var(--primary)}
.inst-sect-head h3{font-family:var(--serif);font-weight:500;font-size:18px;color:var(--primary);line-height:1}
.rule-list{border:1px solid var(--border);list-style:none}
.rule-list li{display:flex;align-items:flex-start;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border)}
.rule-list li:last-child{border-bottom:none}
.rule-list .rn{font-size:11px;color:rgba(10,10,10,.3);font-variant-numeric:tabular-nums;margin-top:2px;width:16px;flex-shrink:0}
.rule-list .rt{font-size:14px;color:rgba(10,10,10,.8);line-height:1.4}
.inst-footer{padding:16px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.inst-footer p{font-size:12px;color:rgba(10,10,10,.4);line-height:1.6;max-width:340px}
.inst-footer button{background:var(--primary);color:var(--accent);padding:12px 24px;font-size:13px;letter-spacing:.04em;border:none;transition:transform .15s}
.inst-footer button:hover{transform:translateY(-1px)}

/* about */
.about-modal{max-width:560px;width:100%;max-height:88vh;overflow-y:auto;position:relative;padding:40px 40px 34px;background:#fff}
.about-modal h2{font-family:var(--serif);font-weight:500;font-size:28px;line-height:1.05;margin-bottom:18px;letter-spacing:-.01em;color:var(--primary)}
.about-modal p{font-size:15px;line-height:1.6;margin-bottom:14px;color:rgba(10,10,10,.82)}
.about-modal strong{font-weight:500;color:var(--primary)}
.about-links{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.about-links li{display:flex;align-items:center;gap:10px;font-size:14px}
.about-links a{color:var(--primary);border-bottom:2px solid var(--accent);padding-bottom:1px;transition:.15s}
.about-links a:hover{background:var(--accent)}
.about-official{margin-top:22px;padding-top:20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.04em}
.about-official a{color:var(--primary);border-bottom:2px solid var(--accent);padding-bottom:1px;display:flex;align-items:center;gap:4px;transition:.15s}
.about-official a:hover{background:var(--accent)}

.icon{flex-shrink:0}

/* ─── Responsive ───────────────────────────────────────────────── */
@media (max-width:768px){
  .nav-links{display:none}
  .hamburger{display:block}
  .hero-grid{display:none}
  .hero-mobile{display:flex}
  .nav-inner{padding:10px 20px}
  .section{padding:56px 20px}
  .mobile-float{display:block}
  .grid2{grid-template-columns:1fr}
  .zone-grid{grid-template-columns:1fr}
  .fields{padding:28px 24px 8px}
  .modal-header{padding:20px 24px}
  .modal-footer{padding:20px 24px}
}
@media (max-width:480px){
  .clock{right:12px;bottom:76px;padding:10px 12px}
}

/* ─── Standalone modal pages ───────────────────────────────────── */
body.standalone-page{background:#fff;padding-bottom:0}
body.standalone-page #app{min-height:100vh}
body.standalone-page .overlay,
body.standalone-page .overlay.scroll{position:static;min-height:100vh;inset:auto;background:#fff}

</style>

/* ─── Helpers ──────────────────────────────────────────────────── */
function toTimeMin(str){ const m=str.match(/(\d+)h\s*(\d+)m/); return m? +m[1]*60+ +m[2] :0; }
function fmtShort(d){ return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function fmtLong(d){
  const dt=new Date(d+"T00:00:00"), day=dt.getDate();
  const suf=["th","st","nd","rd"], v=day%100;
  const suffix=suf[(v-20)%10]||suf[v]||suf[0];
  return dt.toLocaleDateString("en-GB",{day:"numeric",month:"long"}).replace(/^\d+/,day+suffix);
}
function getTodayIndex(){
  const today=new Date().toISOString().slice(0,10);
  let idx=STAGES.findIndex(s=>s[0]===today);
  if(idx<0) idx = today<STAGES[0][0] ? 0 : STAGES.length-1;
  return idx;
}
function getStageDeadline(idx){
  const [date,type]=STAGES[idx];
  if(type==="Rest") return null;
  const [h,m]=STAGE_END_OVERRIDES[date]||STAGE_END_CEST[type]||[17,15];
  const endUtc=new Date(`${date}T${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:00+02:00`);
  return new Date(endUtc.getTime()+8*3600*1000);
}
const pad=n=>String(n).padStart(2,"0");
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ─── Deadline timer ───────────────────────────────────────────── */
function renderDeadline(idx){
  const deadline=getStageDeadline(idx);
  if(!deadline) return document.createComment("no-deadline");
  const wrap=el(`<div class="deadline"></div>`);
  const [date,type]=STAGES[idx];
  const [eh,em]=STAGE_END_OVERRIDES[date]||STAGE_END_CEST[type]||[17,15];
  const endLabel=`${pad(eh)}:${pad(em)} CEST`;
  const dlLabel=new Date(deadline).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"});

  function tick(){
    const ms=Math.max(0,deadline.getTime()-Date.now());
    const tot=Math.floor(ms/1000);
    const hh=Math.floor(tot/3600),mm=Math.floor((tot%3600)/60),ss=tot%60;
    const isExpired=ms===0, isUrgent=!isExpired&&hh<2;
    wrap.className="deadline "+(isExpired?"expired":isUrgent?"urgent":"normal");
    wrap.innerHTML=`
      <div class="deadline-top">
        <div>
          <div class="dl-lbl">${isExpired?"Submission closed":"Time to submit"}</div>
          ${isExpired
            ?`<p class="dl-expired">The 8-hour upload window has closed for this stage.</p>`
            :`<div style="display:flex;align-items:baseline;gap:4px">
                <span class="dl-time">${pad(hh)}:${pad(mm)}:${pad(ss)}</span>
                ${isUrgent?`<span class="dl-urgent-tag">urgent</span>`:""}
              </div>`}
        </div>
        ${isExpired?"":`<div class="dl-right"><div>Stage ends ~${endLabel}</div><div>+8 h buffer · ${dlLabel} CEST deadline</div></div>`}
      </div>
      ${isExpired?"":`<div class="deadline-bar"><span style="width:${Math.min(100,(ms/(8*3600*1000))*100)}%"></span></div>`}`;
  }
  tick(); timers.push(setInterval(tick,1000));
  return wrap;
}

function parseTimeToMin(str){
  const m=String(str||"").trim().match(/^(\d+):(\d{1,2})$/);
  return m?(+m[1])*60+(+m[2]):null;
}

function renderLogEntry(){
  const existing=state.myTodayRide;
  let strava=existing?existing.stravaLink:"", image=null, preview=existing?existing.photo:null,
      km=existing&&existing.distanceKm!=null?String(existing.distanceKm):"",
      timeStr=existing&&existing.timeMin!=null?String(Math.floor(existing.timeMin/60))+":"+String(existing.timeMin%60).padStart(2,"0"):"",
      elev=existing&&existing.elevationM!=null?String(existing.elevationM):"",
      logged=!!existing, errors={}, submitting=false;
  const wrap=el(`<div class="log-wrap">
    <div class="log-lbl">Log today's effort</div>
    <div class="log-inner"></div>
  </div>`);
  const inner=wrap.querySelector(".log-inner");

  function draw(){
    if(logged){
      inner.innerHTML=`<div class="log-success">
        <div class="row">
          <div class="chk"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="#0a0a0a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="msg">Data submitted successfully.</span>
        </div>
        <p>You're on the leaderboard now — check the standings below.</p>
        <p>Call your friends to join this virtual peloton and compete on the leaderboard.</p>
      </div>`;
      return;
    }
    inner.innerHTML=`<div class="log-fields">
      ${errors.form?`<p class="field-err">${esc(errors.form)}</p>`:""}
      <div>
        <input type="url" class="log-input js-strava ${errors.strava?'err':''}" placeholder="Strava activity link  *" value="${esc(strava)}" />
        ${errors.strava?`<p class="field-err">${errors.strava}</p>`:""}
      </div>
      <div class="stats-row">
        <div>
          <input type="text" class="log-input js-km ${errors.km?'err':''}" placeholder="Distance (km)  *" value="${esc(km)}" />
          ${errors.km?`<p class="field-err">${errors.km}</p>`:""}
        </div>
        <div>
          <input type="text" class="log-input js-time ${errors.time?'err':''}" placeholder="Time (h:mm)  *" value="${esc(timeStr)}" />
          ${errors.time?`<p class="field-err">${errors.time}</p>`:""}
        </div>
        <div>
          <input type="text" class="log-input js-elev ${errors.elev?'err':''}" placeholder="Elevation (m)  *" value="${esc(elev)}" />
          ${errors.elev?`<p class="field-err">${errors.elev}</p>`:""}
        </div>
      </div>
      <div class="upload-slot"></div>
      <button class="log-submit js-submit" ${submitting?'disabled':''}>${submitting?'Submitting…':"Submit today's effort"} ${icon('arrow',14)}</button>
    </div>`;

    // upload area
    const slot=inner.querySelector(".upload-slot");
    if(preview){
      const p=el(`<div class="upload-preview"><img src="${preview}" alt="Ride photo"/><button class="rm">${icon('x',12)}</button></div>`);
      p.querySelector(".rm").onclick=()=>{ image=null;preview=null;draw(); };
      slot.replaceWith(p);
    }else{
      const btn=el(`<button class="upload-btn ${errors.image?'err':''}">${icon('bike',16)}<span class="u-txt">Add ride photo  <span style="color:rgba(10,10,10,.3)">*</span></span></button>`);
      const file=el(`<input type="file" accept="image/*" style="display:none" />`);
      btn.onclick=()=>file.click();
      file.onchange=e=>{
        const f=e.target.files&&e.target.files[0]; if(!f)return;
        image=f; delete errors.image;
        const r=new FileReader(); r.onload=ev=>{ preview=ev.target.result; draw(); }; r.readAsDataURL(f);
      };
      slot.replaceWith(btn); btn.after(file);
      if(errors.image) btn.after(el(`<p class="field-err">${errors.image}</p>`));
    }

    const si=inner.querySelector(".js-strava");
    si.oninput=e=>{ strava=e.target.value; delete errors.strava; };
    inner.querySelector(".js-km").oninput=e=>{ km=e.target.value; delete errors.km; };
    inner.querySelector(".js-time").oninput=e=>{ timeStr=e.target.value; delete errors.time; };
    inner.querySelector(".js-elev").oninput=e=>{ elev=e.target.value; delete errors.elev; };
    inner.querySelector(".js-submit").onclick=async()=>{
      errors={};
      if(!strava.trim()||!/strava\.com\//i.test(strava)) errors.strava="A valid Strava activity link is required.";
      if(!image) errors.image="A photo of your ride is required.";
      if(!km.trim()||!(Number(km)>0)) errors.km="Enter your distance in km.";
      const timeMinVal=parseTimeToMin(timeStr);
      if(!timeStr.trim()||!timeMinVal) errors.time="Enter time as h:mm, e.g. 1:35.";
      if(!elev.trim()||isNaN(Number(elev))||Number(elev)<0) errors.elev="Enter elevation in metres.";
      if(Object.keys(errors).length){ draw(); return; }

      submitting=true; draw();
      try{
        const res=await fetch("/api/rides",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            stageDate:STAGES[state.todayIdx][0],
            stravaLink:strava,
            distanceKm:Number(km),
            timeMin:timeMinVal,
            elevationM:Number(elev),
            photo:preview,
          }),
        });
        let data={}; try{ data=await res.json(); }catch{}
        if(!res.ok) throw new Error(data.error||"Could not submit your ride.");
        state.myTodayRide=data.ride;
        logged=true; submitting=false; draw();
        await fetchLeaderboard(); renderApp();
      }catch(err){
        submitting=false; errors.form=err.message; draw();
      }
    };
  }
  draw();
  return wrap;
}

  const sec=el(`<section id="leaderboard" class="section">

      <div>
        <h2 class="serif">Leaderboard</h2>
        <p>Live standings across the Indian peloton — every metric, upfront.</p>
      </div>
      <div class="filters">
        <div class="filter-group js-zone" role="group" aria-label="Distance zone"></div>
        <div class="filter-group js-sort" role="group" aria-label="Sort by"></div>
      </div>
    </div>
    <div class="table-wrap"><table class="lb-table"><thead></thead><tbody></tbody></table></div>
  </section>`);

  const zoneG=sec.querySelector(".js-zone"), sortG=sec.querySelector(".js-sort");
  zoneOpts.forEach(z=>{
    const b=el(`<button>${z==="all"?"All":z}</button>`);
    b.onclick=()=>{ lbZone=z; draw(); };
    b.dataset.z=z; zoneG.appendChild(b);
  });
  sortOpts.forEach(([k,l])=>{
    const b=el(`<button>${l}</button>`);
    b.onclick=()=>{ lbSort=k; draw(); };
    b.dataset.s=k; sortG.appendChild(b);
  });

  const thead=sec.querySelector("thead"), tbody=sec.querySelector("tbody");
  function draw(){
    zoneG.querySelectorAll("button").forEach(b=>b.classList.toggle("active",String(b.dataset.z)===String(lbZone)));
    sortG.querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.s===lbSort));

    const mark=`<span class="sortmark">↑</span>`;
    thead.innerHTML=`<tr>
      <th style="width:52px">#</th><th>Rider</th><th>Zone</th>
      <th class="r ${lbSort==='time'?'on':''}">Time Spent ${lbSort==='time'?mark:''}</th>
      <th class="r ${lbSort==='dist'?'on':''}">Distance ${lbSort==='dist'?mark:''}</th>
      <th class="r ${lbSort==='elev'?'on':''}">Elevation ${lbSort==='elev'?mark:''}</th>
    </tr>`;

    const filtered=RIDERS.filter(r=>lbZone==="all"||r[2]===lbZone);
    const sorted=[...filtered].sort((a,b)=>{
      if(lbSort==="time")return toTimeMin(b[3])-toTimeMin(a[3]);
      if(lbSort==="elev")return b[4]-a[4];
      return b[5]-a[5];
    }).slice(0,10);

    tbody.innerHTML=sorted.map((r,i)=>{
      const first=i===0;
      const metric=(val,unit,hi)=>`<div class="metric"><span class="val ${hi?'hi':''}">${val}</span><span class="unit">${unit}</span></div>`;
      return `<tr class="${first?'first':''}">
        <td class="rank">${pad(i+1)}</td>
        <td><span class="rider-name">${esc(r[0])}</span><span class="rider-city">${esc(r[1])}</span></td>
        <td><span class="zone-tag">${r[2].toLocaleString()} km</span></td>
        <td>${metric(r[3],"hrs",lbSort==="time")}</td>
        <td>${metric(r[5].toLocaleString(),"km",lbSort==="dist")}</td>
        <td>${metric(r[4].toLocaleString(),"m",lbSort==="elev")}</td>
      </tr>`;
    }).join("");
  }
  draw();
  return sec;
}

/* ─── Live France clock ────────────────────────────────────────── */
function renderClock(){
  const aside=el(`<aside class="clock" aria-label="Live France time">
    <em class="fr"><span class="dot"></span>France</em>
    <div class="t"><strong class="js-time">--:--:--</strong><span class="ampm js-ampm">--</span></div>
  </aside>`);
  const tEl=aside.querySelector(".js-time"), aEl=aside.querySelector(".js-ampm");
  function tick(){
    const now=new Date();
    const parts=new Intl.DateTimeFormat("en-US",{hour:"numeric",hour12:true,timeZone:"Europe/Paris"}).formatToParts(now);
    const hNum=parseInt(parts.find(p=>p.type==="hour").value);
    const ampm=parts.find(p=>p.type==="dayPeriod").value.toUpperCase();
    const mm=pad(now.toLocaleString("en-US",{minute:"2-digit",timeZone:"Europe/Paris"}));
    const ss=pad(now.toLocaleString("en-US",{second:"2-digit",timeZone:"Europe/Paris"}));
    tEl.textContent=`${pad(hNum)}:${mm}:${ss}`; aEl.textContent=ampm;
  }
  tick(); timers.push(setInterval(tick,1000));
  return aside;
}

/* ─── Sticky progress ──────────────────────────────────────────── */
function renderStickyProgress(){
  const idx=state.todayIdx, todaySeg=STAGES[idx], isRest=todaySeg[1]==="Rest";
  let stageN=0; STAGES.slice(0,idx+1).forEach(s=>{ if(s[1]!=="Rest")stageN++; });
  const todayLabel=isRest?"Rest Day":`Stage ${stageN} · ${fmtShort(todaySeg[0])}`;

  const segs=STAGES.map((s,i)=>{
    const isRestS=s[1]==="Rest", isToday=i===idx, isPast=i<idx;
    let fill,seg="seg";
    if(isToday){ seg+=" seg-current"; fill="f-today"; }
    else if(isRestS)fill="f-rest";
    else if(isPast)fill="f-past";
    else fill="f-future";
    const title=isRestS?`${fmtShort(s[0])} · Rest Day`:`${fmtShort(s[0])} · ${s[1]}`;
    const marker=isToday?`<div class="marker"><div class="stem"></div><div class="dot"></div></div>`:"";
    return `<div class="${seg}" title="${esc(title)}"><span class="${fill}"></span>${marker}</div>`;
  }).join("");

  const foot=el(`<footer class="sticky-progress" aria-label="Tour progress">
    <div class="sp-head"><span class="l">Your Progress</span><span class="r">${todayLabel}</span></div>
    <div class="sp-scroll"><div class="sp-track">${segs}</div></div>
    ${creditLine()}
  </footer>`);
  requestAnimationFrame(()=>{
    const sc=foot.querySelector(".sp-scroll"), cur=foot.querySelector(".seg-current");
    if(cur) sc.scrollLeft = cur.offsetLeft - sc.clientWidth/2 + cur.offsetWidth/2;
  });
  return foot;
}

function renderModalLayer(){
  let layer=document.getElementById("modal-layer");
  if(!layer){ layer=el(`<div id="modal-layer"></div>`); document.body.appendChild(layer); }

  if(!state.modal) return;
  let node;
  if(state.modal==="about") node=renderAbout();
  if(state.modal==="login") node=renderLogin();
  if(state.modal==="register") node=renderRegister();
  if(state.modal==="instructions") node=renderInstructions();
  if(node) layer.appendChild(node);
}

/* Login modal */
function renderLogin(){
  let email="",password="",showPw=false,error="";
  const ov=el(`<div class="overlay" role="dialog" aria-modal="true">
    <div class="modal w440">
      <div class="modal-header">

  function draw(){
    form.innerHTML=`

        <div class="field">
          <label>Email</label>
          <input type="email" class="inp js-email" placeholder="arjun@example.com" value="${esc(email)}" autocomplete="email"/>

        <p>Don't have an account? <button class="switch-link js-switch">Register</button></p>
        <button class="btn-submit js-submit">Log in ${icon('arrow',16)}</button>
      </div>`;
    form.querySelector(".js-email").oninput=e=>{ email=e.target.value; error=""; };
    form.querySelector(".js-pw").oninput=e=>{ password=e.target.value; error=""; };
    form.querySelector(".js-toggle").onclick=()=>{ showPw=!showPw; draw(); };
    form.querySelector(".js-switch").onclick=()=>{ if(NAV_MODE==="pages"){go("register");return;} closeModal(); openModal("register"); };
    form.querySelector(".js-submit").onclick=async()=>{
      if(!email.trim()||!password.trim()){ error="Please enter your email and password."; draw(); return; }
      const btn=form.querySelector(".js-submit"); btn.disabled=true;
      try{
        const res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
        const data=await res.json();
        if(!res.ok) throw new Error(data.error||"Login failed.");
        if(NAV_MODE==="pages"){ window.location.href="home.html"; return; }
        await applyLoggedInUser(data.user); await fetchLeaderboard();
        closeModal(); renderApp();
      }catch(err){
        error=err.message; draw();
      }finally{
        btn.disabled=false;
      }
    };
  }
  draw();
  ov.querySelector(".modal-close").onclick=closeModal;
  overlayClose(ov);
  return ov;
}

/* Register modal */
function renderRegister(){
  let name="",email="",strava="",zone=null,username="",password="",confirm="",
      showPw=false,showCf=false,submitted=false,errors={},registeredUser=null;

  const ov=el(`<div class="overlay scroll" role="dialog" aria-modal="true">
    <div class="modal w660" style="margin:auto">
      <div class="modal-header">
        <div><div class="mh-kicker">Tour de France 2026</div><h2 class="serif">Join the Peloton</h2></div>
        <button class="modal-close" aria-label="Close">${icon('x',22)}</button>
      </div>
      <div class="js-body"></div>
    </div></div>`);
  const body=ov.querySelector(".js-body");

  function validate(){
    const e={};
    if(!name.trim())e.name="Please enter your full name.";
    if(!email.trim())e.email="Please enter your email.";
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))e.email="Enter a valid email address.";
    if(!strava.trim())e.strava="Please enter your Strava athlete link.";
    else if(!/strava\.com\/athletes\//i.test(strava))e.strava="Must be a strava.com/athletes/… link.";
    if(!zone)e.zone="Please select a zone.";
    if(!username.trim())e.username="Choose a username.";
    else if(username.length<3)e.username="Username must be at least 3 characters.";
    else if(!/^[a-z0-9_.]+$/i.test(username))e.username="Only letters, numbers, dots and underscores.";
    if(!password)e.password="Please create a password.";
    else if(password.length<8)e.password="Password must be at least 8 characters.";
    if(!confirm)e.confirm="Please confirm your password.";
    else if(confirm!==password)e.confirm="Passwords do not match.";
    return e;
  }

  function draw(){
    if(submitted){
      const z=ZONES.find(z=>z.km===zone);
      body.innerHTML=`<div class="reg-success">
        <div class="ico">${icon('bike',24)}</div>
        <div>
          <h3 class="serif">Welcome, ${esc(name.split(" ")[0])}.</h3>
          <p>You're registered as <strong>@${esc(username)}</strong> in the <strong>${z.label} — ${z.tag}</strong> zone. Your Strava will be verified within 24h and you'll appear on the leaderboard shortly after.</p>
        </div>
        <button class="back js-back">Back to the race</button>
      </div>`;
      body.querySelector(".js-back").onclick=async()=>{
        if(NAV_MODE==="pages"){ window.location.href="home.html"; return; }
        if(registeredUser){ await applyLoggedInUser(registeredUser); } else { state.isLoggedIn=true; state.activeZone=zone; }
        await fetchLeaderboard();
        closeModal(); renderApp();
      };
      return;
    }

    const pwStrength=password.length===0?0:password.length<8?1:password.length<12?2:3;
    const pwLabel=["","Weak","Good","Strong"][pwStrength];

    const zoneCards=ZONES.map(z=>{
      const sel=zone===z.km;
      return `<button type="button" class="zone-card ${sel?'sel':''}" data-km="${z.km}">
        <div class="zc-top">
          <span class="zc-km serif">${z.label}</span>
          <span class="zc-tag">${z.tag}</span>
        </div>
        <p class="zc-desc">${z.desc}</p>
      </button>`;
    }).join("");

    body.innerHTML=`
      <div class="fields">
        ${errors.form?`<p class="err-msg" style="margin-bottom:4px">${esc(errors.form)}</p>`:""}
        <div class="grid2">
          <div class="field">
            <label>Full Name</label>
            <input type="text" class="inp js-name ${errors.name?'err':''}" placeholder="Arjun Nair" value="${esc(name)}" autocomplete="name"/>
            ${errors.name?`<p class="err-msg">${errors.name}</p>`:""}
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" class="inp js-email ${errors.email?'err':''}" placeholder="arjun@example.com" value="${esc(email)}" autocomplete="email"/>
            ${errors.email?`<p class="err-msg">${errors.email}</p>`:""}
          </div>
        </div>
        <div class="field">
          <label>Strava Athlete Link</label>
          <input type="url" class="inp js-strava ${errors.strava?'err':''}" placeholder="https://www.strava.com/athletes/12345678" value="${esc(strava)}"/>
          ${errors.strava?`<p class="err-msg">${errors.strava}</p>`
            :`<p class="field-hint">${icon('activity',11)}Your profile must be set to <strong>public</strong>.</p>`}
        </div>
        <div class="field">
          <label>Choose Your Zone</label>
          <div class="zone-grid">${zoneCards}</div>
          ${errors.zone?`<p class="err-msg">${errors.zone}</p>`:""}
        </div>
        <div class="field">
          <label>Username</label>
          <div class="relative">
            <span class="at-prefix">@</span>
            <input type="text" class="inp js-username ${errors.username?'err':''}" placeholder="arjun_nair" value="${esc(username)}" style="padding-left:32px" autocomplete="username"/>
          </div>
          ${errors.username?`<p class="err-msg">${errors.username}</p>`
            :`<p class="field-hint">This will appear on the leaderboard. Letters, numbers, dots and underscores only.</p>`}
        </div>
        <div class="grid2">
          <div class="field">
            <label>Create Password</label>
            <div class="relative">
              <input type="${showPw?'text':'password'}" class="inp js-pw ${errors.password?'err':''}" placeholder="Min. 8 characters" value="${esc(password)}" style="padding-right:52px" autocomplete="new-password"/>
              <button type="button" class="pw-toggle js-tpw">${showPw?'Hide':'Show'}</button>
            </div>
            ${password.length>0?`<div class="pw-strength"><div class="pw-bars">
              ${[1,2,3].map(l=>`<div class="${pwStrength>=l?'s'+pwStrength:''}"></div>`).join("")}
            </div><span class="plabel">${pwLabel}</span></div>`:""}
            ${errors.password?`<p class="err-msg">${errors.password}</p>`:""}
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <div class="relative">
              <input type="${showCf?'text':'password'}" class="inp js-cf ${errors.confirm?'err':''}" placeholder="Repeat password" value="${esc(confirm)}" style="padding-right:52px" autocomplete="new-password"/>
              <button type="button" class="pw-toggle js-tcf">${showCf?'Hide':'Show'}</button>
            </div>
            ${errors.confirm?`<p class="err-msg">${errors.confirm}</p>`:""}
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <p>Already have an account? <button class="switch-link js-switch">Log in</button></p>
        <button class="btn-submit js-submit">Register for the ride ${icon('arrow',16)}</button>
      </div>`;

    const q=s=>body.querySelector(s);
    q(".js-name").oninput=e=>{ name=e.target.value; delete errors.name; };
    q(".js-email").oninput=e=>{ email=e.target.value; delete errors.email; };
    q(".js-strava").oninput=e=>{ strava=e.target.value; delete errors.strava; };
    q(".js-username").oninput=e=>{ username=e.target.value.toLowerCase(); e.target.value=username; delete errors.username; };
    q(".js-pw").oninput=e=>{ password=e.target.value; delete errors.password; delete errors.confirm;
      // live-update strength bar without losing focus
      const wrap=e.target.closest(".field");
      const ps=password.length===0?0:password.length<8?1:password.length<12?2:3;
      const lbl=["","Weak","Good","Strong"][ps];
      let s=wrap.querySelector(".pw-strength");
      const barsHTML=[1,2,3].map(l=>`<div class="${ps>=l?'s'+ps:''}"></div>`).join("");
      if(password.length>0){
        if(!s){ s=el(`<div class="pw-strength"><div class="pw-bars">${barsHTML}</div><span class="plabel">${lbl}</span></div>`); e.target.closest(".relative").after(s); }
        else{ s.querySelector(".pw-bars").innerHTML=barsHTML; s.querySelector(".plabel").textContent=lbl; }
      } else if(s){ s.remove(); }
    };
    q(".js-cf").oninput=e=>{ confirm=e.target.value; delete errors.confirm; };
    q(".js-tpw").onclick=()=>{ showPw=!showPw; draw(); };
    q(".js-tcf").onclick=()=>{ showCf=!showCf; draw(); };
    q(".js-switch").onclick=()=>{ if(NAV_MODE==="pages"){go("login");return;} closeModal(); openModal("login"); };
    body.querySelectorAll(".zone-card").forEach(c=>{
      c.onclick=()=>{ zone=+c.dataset.km; delete errors.zone; draw(); };
    });
    q(".js-submit").onclick=async()=>{
      errors=validate();
      if(Object.keys(errors).length){ draw(); return; }
      const btn=q(".js-submit"); btn.disabled=true;
      try{
        const res=await fetch("/api/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({fullName:name,email,stravaId:strava,zone,username,password})});
        const data=await res.json();
        if(!res.ok) throw new Error(data.error||"Registration failed.");
        registeredUser=data.user;
        submitted=true; draw();
      }catch(err){
        errors={form:err.message}; draw();
      }finally{
        if(btn) btn.disabled=false;
      }
    };
  }
  draw();
  ov.querySelector(".modal-close").onclick=closeModal;
  overlayClose(ov);
  return ov;
}

  // Hero
  const hero=el(`<section class="hero"><div class="hero-grid"></div><div class="hero-mobile"></div></section>`);
  const grid=hero.querySelector(".hero-grid"), mob=hero.querySelector(".hero-mobile");

  // desktop
  const left=el(`<div class="hero-left"></div>`);
  left.appendChild(renderRouteMap());
  left.appendChild(renderStageList());
  grid.appendChild(left);
  grid.appendChild(state.isLoggedIn?renderYourStageActive():renderYourStageEmpty());

  // mobile
  mob.appendChild(renderRouteMap());
  if(state.isLoggedIn){
    mob.appendChild(renderYourStageActive());
  }else{
    const wrap=el(`<div style="border-top:1px solid var(--border)"></div>`);
    wrap.appendChild(renderStageList());
    mob.appendChild(wrap);
  }
  frag.appendChild(hero);

  // mobile floating CTA
  if(!state.isLoggedIn){
    const f=el(`<div class="mobile-float"><button>Register for this ride ${icon('arrow',15)}</button></div>`);
    f.querySelector("button").onclick=()=>openOrGo("register");
    frag.appendChild(f);
  }

  // leaderboard + consistency
  const board=el(`<div id="leaderboard"></div>`);
  board.appendChild(renderLeaderboard());
  board.appendChild(renderConsistency());
  frag.appendChild(board);

  return frag;
}

/* ─── Root render ──────────────────────────────────────────────── */
function renderApp(){
  clearTimers();
  const app=document.getElementById("app");
  app.innerHTML="";
  const shell=el(`<div class="shell"></div>`);
  shell.appendChild(renderNav());
  shell.appendChild(renderMarquee());
  const main=el(`<div style="flex:1;display:flex;flex-direction:column"></div>`);
  main.appendChild(renderHome());
  shell.appendChild(main);
  app.appendChild(shell);
  app.appendChild(renderClock());
  app.appendChild(renderStickyProgress());
  renderModalLayer();
}

/* ─── Standalone modal-page renderer ───────────────────────────── */
/* Renders a single modal centered on a plain page (used by the
   separate register/login/about pages). Close/back navigate home. */
function renderStandaloneModal(name){
  document.body.classList.add("standalone-page");
  const app=document.getElementById("app");
  app.innerHTML="";
  let node;
  if(name==="about") node=renderAbout();
  else if(name==="login") node=renderLogin();
  else if(name==="register") node=renderRegister();
  else if(name==="instructions") node=renderInstructions();
  if(node) app.appendChild(node);
  document.body.appendChild(el(creditLine(true)));
}

/* ─── Init ─────────────────────────────────────────────────────── */
(async function boot(){
  const page = window.__TDF_PAGE__ || "app";
  if(page==="app"){
    try{
      const res=await fetch("/api/me");
      if(res.ok){
        const {user}=await res.json();
        await applyLoggedInUser(user);
      }
    }catch{}
    await fetchLeaderboard();
    renderApp();
  }else{
    renderStandaloneModal(page);
  }
})();

</script>
</body>
</html>
